services:
  app:
    build: .
    container_name: fhir-patient-summary-app
    ports:
      - "7860:7860"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      IRIS_BASE_URL: ${IRIS_BASE_URL:-http://host.docker.internal:52773/csp/healthshare/fhir/fhir/r4}
      IRIS_USERNAME: ${IRIS_USERNAME:-superuser}
      IRIS_PASSWORD: ${IRIS_PASSWORD}
      FHIR_FALLBACK_PATH: ${FHIR_FALLBACK_PATH:-data}
      LOAD_SAMPLE_BUNDLE: ${LOAD_SAMPLE_BUNDLE:-false}

  iris:
    profiles:
      - local-iris
    image: intersystems/irishealth-community:latest-em
    container_name: fhir-local-iris
    ports:
      - "52773:52773"
      - "1972:1972"
    volumes:
      - irishealth-durable:/dur
    environment:
      ISC_DATA_DIRECTORY: /dur

volumes:
  irishealth-durable:
