services:
  iris:
    image: intersystems/irishealth-community:latest-em
    container_name: fhir-patient-summary
    ports:
      - "52773:52773"
      - "1972:1972"
    volumes:
      - irishealth-durable:/dur
      - ./src:/irisdev/app/src
    environment:
      ISC_DATA_DIRECTORY: /dur/iconfig

volumes:
  irishealth-durable: